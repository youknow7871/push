<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMall 푸시 알림 이벤트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        .mobile-container {
            width: 100%;
            max-width: 400px;
            height: 800px;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        /* Decorative Background Elements */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59,130,246,0.8) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
            z-index: 0;
        }

        .glow2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(236,72,153,0.3) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px;
            right: -150px;
            border-radius: 50%;
            z-index: 0;
        }

        .kv-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 50px 20px;
            flex-grow: 1;
        }

        .badge {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            color: #451a03;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(245,158,11,0.4);
            animation: bounceIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1.3;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .highlight {
            color: #fbbf24;
            display: block;
            font-size: 2.8rem;
            background: -webkit-linear-gradient(#fde047, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        /* 3D Object Area (using emojis for prototype) */
        .visual-area {
            position: relative;
            width: 250px;
            height: 250px;
            margin-bottom: 40px;
            animation: float 4s ease-in-out infinite;
        }

        .main-coin {
            font-size: 8rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
            z-index: 2;
        }

        .small-coin {
            font-size: 3rem;
            position: absolute;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
        }

        .coin1 { top: 10%; left: 10%; animation: float 3s ease-in-out infinite 0.5s; }
        .coin2 { top: 20%; right: 5%; animation: float 3.5s ease-in-out infinite 1s; }
        .coin3 { bottom: 10%; left: 20%; animation: float 2.5s ease-in-out infinite 0.2s; font-size: 4rem;}
        .coin4 { bottom: 30%; right: 10%; animation: float 4s ease-in-out infinite 0.8s; }

        .gift {
            font-size: 5rem;
            position: absolute;
            bottom: -10%;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            z-index: 3;
            animation: bounce 2s infinite;
        }

        /* Bottom Action Area */
        .action-area {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px 30px 0 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white;
            border: none;
            padding: 18px 20px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(234, 88, 12, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 5px 15px rgba(234, 88, 12, 0.4);
        }

        .btn-primary::after {
            content: '➔';
            font-size: 1.4rem;
        }

        .btn-secondary {
            background: transparent;
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-secondary:active {
            background: rgba(255,255,255,0.1);
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInDown {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-20px); }
            60% { transform: translateX(-50%) translateY(-10px); }
        }

    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="glow"></div>
        <div class="glow2"></div>
        
        <div class="kv-content">
            <div class="badge">현대Hmall 앱 전용</div>
            
            <h1 class="title">
                푸시 알림 켜면<br>
                <span class="highlight">1,000원 즉시 장전!</span>
            </h1>
            
            <div class="visual-area">
                <div class="small-coin coin1">🪙</div>
                <div class="small-coin coin2">✨</div>
                <div class="main-coin">💰</div>
                <div class="small-coin coin3">🪙</div>
                <div class="small-coin coin4">💸</div>
                <div class="gift">🎁</div>
            </div>
        </div>

        <div class="action-area">
            <button class="btn-primary">알림 켜고 1,000원 받기</button>
            <button class="btn-secondary">적립금 확인하기</button>
        </div>
    </div>
</body>
</html>
